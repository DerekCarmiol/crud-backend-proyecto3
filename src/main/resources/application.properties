spring.application.name=crud-backend

# ===========================================================================
# Base de datos MySQL (local, no cloud)
# Si usa el docker-compose incluido, la base "proyecto3_db" ya se crea sola.
# Ajuste usuario/contraseña según su instalación local de MySQL.
# ===========================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto3_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Derek123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================================================================
# JPA / Hibernate
# create-drop: recrea el esquema vacío en cada arranque y lo elimina al
# apagar. Así, en cada ejecución solo existen los roles y usuarios sembrados
# por DataInitializer; los productos y categorías no persisten entre sesiones
# y los IDs vuelven a empezar en 1.
# ===========================================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================================================
# JWT (la clave debe tener al menos 32 caracteres para HS256)
# expiration en milisegundos (86400000 = 24 horas)
# ===========================================================================
jwt.secret=proyecto3-crud-backend-clave-secreta-jwt-super-segura-2026
jwt.expiration=86400000
